# Disable WirePlumber's auto-switch logic for Bluetooth profiles.
# By default, WirePlumber switches to HFP when a capture stream opens,
# then back to A2DP 2 seconds after the stream closes.
# This causes the mic to disappear periodically.
# We disable autoswitch and force HFP permanently below.
wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
}

# Force JBL Flip 4 to always use HFP (headset-head-unit).
# This keeps the microphone available at all times.
# EDIT: replace the device.name value with your BT device MAC (underscores, not colons).
monitor.bluez.rules = [
  {
    matches = [
      { "device.name" = "bluez_card.5C_FB_7C_2F_70_4D" }
    ]
    actions = {
      update-props = {
        "bluez5.profile" = "headset-head-unit"
      }
    }
  }
]
