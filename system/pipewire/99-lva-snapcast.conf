context.objects = [
  { factory = adapter
    args = {
      factory.name                 = support.null-audio-sink
      node.name                    = lva-snapcast
      node.description             = "LVA Snapcast Sink"
      media.class                  = Audio/Sink
      object.linger                = true
      audio.format                 = S16LE
      audio.rate                   = 22050
      audio.channels               = 1
      audio.position               = [ MONO ]
      # Without this, the sink suspends when idle and pacat exits immediately.
      session.suspend-timeout-seconds = 0
    }
  }
]
